<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Jeans | Catálogo Exclusivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nude: '#fdfbfb',
                        blush: '#fcf3f2',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-nude text-gray-800 font-sans selection:bg-rose-200">

    <header class="bg-white sticky top-0 z-50 border-b border-gray-100/50 shadow-sm">
        <div class="container mx-auto px-4 py-5 flex flex-col items-center">
            <img src="logo.png" alt="Surprise Jeans Logo" class="h-16 md:h-20 object-contain mb-2">
            <p class="text-stone-400 text-xs tracking-[0.25em] uppercase font-light">Mayoreo y Menudeo</p>
        </div>
    </header>

    <section class="bg-blush py-12 px-4 mb-8">
        <div class="container mx-auto text-center max-w-2xl">
            <h2 class="text-3xl md:text-4xl font-serif text-stone-800 mb-3 tracking-wide">Realza tu figura</h2>
            <p class="text-stone-500 text-sm md:text-base font-light">Descubre nuestra nueva colección. El fit perfecto diseñado para ti, directo de fábrica.</p>
        </div>
    </section>

    <main class="container mx-auto px-4 py-4 mb-16">
        
        <div class="mb-10 text-center">
            <div id="contenedor-categorias" class="flex flex-wrap justify-center gap-3">
                </div>
        </div>

        <div id="contenedor-pantalones" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-10">
            </div>

    </main>

    <footer class="bg-white border-t border-gray-100 py-10 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-stone-400 text-xs tracking-widest uppercase mb-2">Surprise Jeans © 2026</p>
            <p class="text-stone-400 text-xs">Hecho con amor para el mejor fit.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
