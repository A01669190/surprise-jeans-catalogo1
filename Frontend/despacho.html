<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Despacho | Surprise Jeans</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/7wby2CC/caja.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-black text-indigo-600">Admin <span class="text-gray-900">Surprise Jeans</span> 📦</h1>
                <p class="text-xs text-gray-500 mt-1">Gestión de envíos y control de inventario</p>
            </div>
            <div id="nav-botones" class="hidden flex gap-4">
                <button onclick="cambiarPestana('pedidos')" id="tab-pedidos" class="bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg text-sm shadow">Pedidos</button>
                <button onclick="cambiarPestana('inventario')" id="tab-inventario" class="bg-white text-gray-600 border border-gray-300 font-bold py-2 px-6 rounded-lg text-sm hover:bg-gray-50 transition-colors">Inventario</button>
                <button onclick="cerrarSesion()" class="text-sm font-bold text-rose-500 hover:text-rose-700 ml-4">Salir</button>
                <button onclick="lanzarRecuperacion()" class="bg-amber-400 hover:bg-amber-500 text-stone-900 font-bold py-2 px-4 rounded-xl shadow-sm transition-colors text-sm ml-2">🛒 Recuperar Ventas</button>
                
                <!-- ⚡ AQUÍ DEBE ESTAR EL NUEVO BOTÓN ⚡ -->
                <button onclick="descargarReporteExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-4 rounded-xl shadow-sm transition-colors text-sm ml-2 flex items-center gap-2">
                    <span class="text-lg">📊</span> Descargar Excel
                </button>
            </div>
        </header>

        <div id="pantalla-login" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 max-w-sm mx-auto mt-20">
            <h2 class="text-xl font-bold text-center mb-6">Acceso a Almacén</h2>
            <input type="password" id="pass" placeholder="Contraseña Maestra" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            <button onclick="iniciarSesion()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 shadow-md">Entrar</button>
        </div>

        <div id="pantalla-pedidos" class="hidden">
            <div id="grid-pedidos" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="pantalla-inventario" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Control Rápido de Stock</h3>
                    <p class="text-xs text-gray-500">Los cambios se guardan al instante.</p>
                </div>
                <div class="overflow-x-auto h-[600px] overflow-y-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-indigo-900 text-white sticky top-0 z-10 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="p-4">Modelo</th>
                                <th class="p-4 text-center">Precio ($)</th>
                                <th class="p-4 text-center">Existencias</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-inventario"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://surprise-jeans-api-denz.onrender.com';
        let tokenPrivado = null; 
        
        // ⚡ WEBSOCKETS: Sonido y Conexión
        const sonidoDin = new Audio('https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3');
        let socket = null;
        let historialPedidos = []; // Guardará los datos para el Excel

        function conectarTúnelEnVivo() {
            const wsUrl = API_URL.replace('https://', 'wss://').replace('http://', 'ws://') + '/ws/despacho';
            socket = new WebSocket(wsUrl);

            socket.onopen = function(e) {
                Swal.fire({
                    title: '📡 Túnel Conectado',
                    text: 'Escuchando pagos en tiempo real...',
                    icon: 'success', toast: true, position: 'bottom-end',
                    showConfirmButton: false, timer: 3000
                });
            };

            socket.onmessage = function(event) {
                if (event.data === "NUEVO_PEDIDO") {
                    sonidoDin.play().catch(e => console.log("El navegador bloqueó el sonido."));
                    Swal.fire({
                        title: '¡Nuevo Pedido! 📦',
                        text: 'El pago ha sido procesado con éxito.',
                        icon: 'info', toast: true, position: 'top-end',
                        showConfirmButton: false, timer: 4000, timerProgressBar: true
                    });
                    cargarPedidos(); 
                } 
                else if (event.data === "ACTUALIZAR_ADMIN") {
                    // ⚡ 1. HACEMOS QUE SUENE EL DIIIIN AL ESCANEAR
                    sonidoDin.play().catch(e => console.log("El navegador bloqueó el sonido."));
                    
                    // ⚡ 2. MOSTRAMOS UNA ALERTA VERDE CONFIRMANDO EL ENVÍO
                    Swal.fire({
                        title: '¡Paquete Escaneado! 🚀',
                        text: 'El pedido se movió a ENVIADO.',
                        icon: 'success', toast: true, position: 'top-end',
                        showConfirmButton: false, timer: 3000
                    });

                    // ⚡ 3. ACTUALIZAMOS LOS CARRITOS EN PANTALLA
                    cargarPedidos();
                }
            };

            socket.onclose = function() { 
                console.log("El túnel se durmió. Reconectando...");
                setTimeout(conectarTúnelEnVivo, 5000); 
            };
        }

        async function marcarEntregado(id) {
            const result = await Swal.fire({
                title: '¿Marcar como Entregado?',
                text: 'El ciclo de esta venta se cerrará y el cliente lo verá en su perfil.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0f766e',
                confirmButtonText: 'Sí, finalizar'
            });

            if (result.isConfirmed) {
                Swal.showLoading();
                try {
                    const res = await fetch(`${API_URL}/pedidos/${id}/entregar`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `Bearer ${tokenPrivado}` }
                    });
                    
                    if (res.ok) {
                        Swal.fire({ icon: 'success', title: '¡Entregado!', showConfirmButton: false, timer: 1500 });
                        cargarPedidos();
                    } else if (res.status === 401) {
                        cerrarSesion(); // ⚡ Protegemos si la computadora de Yessica se durmió
                    } else {
                        const errorData = await res.json();
                        Swal.fire('Error del servidor', errorData.detail || 'No se pudo actualizar el estatus.', 'error');
                    }
                } catch(e) { 
                    Swal.fire('Error', 'Fallo de conexión con el servidor', 'error'); 
                }
            }
        }

        async function lanzarRecuperacion() {
            Swal.fire({ title: 'Escaneando carritos...', text: 'Buscando clientes que no terminaron su pago.', allowOutsideClick: false, showConfirmButton: false });
            Swal.showLoading();

            try {
                const res = await fetch(`${API_URL}/admin/lanzar-recuperacion`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${tokenPrivado}` }
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire({ icon: 'success', title: '¡Campaña Lanzada!', text: data.mensaje, confirmButtonColor: '#10b981' });
                    cargarPedidos(); 
                } else {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo lanzar la campaña.' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Fallo de conexión.' });
            }
        }

        async function iniciarSesion() {
            const pass = document.getElementById('pass').value;
            const formData = new URLSearchParams();
            formData.append('username', 'admin');
            formData.append('password', pass);

            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    tokenPrivado = data.access_token; 
                    sessionStorage.setItem('refresh_token_despacho', data.refresh_token); // ⚡ NUEVA LÍNEA 
                    
                    document.getElementById('pantalla-login').classList.add('hidden');
                    document.getElementById('nav-botones').classList.remove('hidden');
                    document.getElementById('pass').value = ''; 
                    
                    conectarTúnelEnVivo(); 
                    cambiarPestana('pedidos');
                } else {
                    Swal.fire({icon: 'error', title: 'Acceso Denegado', text: 'Contraseña incorrecta'});
                }
            } catch (error) {
                Swal.fire({icon: 'error', title: 'Error', text: 'Fallo de conexión al servidor'});
            }
        }

        function cerrarSesion() { window.location.reload(); }

        function cambiarPestana(pestana) {
            const btnPedidos = document.getElementById('tab-pedidos');
            const btnInv = document.getElementById('tab-inventario');
            
            if(pestana === 'pedidos') {
                btnPedidos.className = "bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg text-sm shadow transition-colors";
                btnInv.className = "bg-white text-gray-600 border border-gray-300 font-bold py-2 px-6 rounded-lg text-sm hover:bg-gray-50 transition-colors";
                document.getElementById('pantalla-pedidos').classList.remove('hidden');
                document.getElementById('pantalla-inventario').classList.add('hidden');
                cargarPedidos();
            } else {
                btnInv.className = "bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg text-sm shadow transition-colors";
                btnPedidos.className = "bg-white text-gray-600 border border-gray-300 font-bold py-2 px-6 rounded-lg text-sm hover:bg-gray-50 transition-colors";
                document.getElementById('pantalla-inventario').classList.remove('hidden');
                document.getElementById('pantalla-pedidos').classList.add('hidden');
                cargarInventario();
            }
        }

        function iniciarRenovacionDespacho() {
            setInterval(async () => {
                const refresh = sessionStorage.getItem('refresh_token_despacho');
                if (!refresh) return;

                try {
                    const res = await fetch(`${API_URL}/refresh-token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh_token: refresh })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        tokenPrivado = data.access_token; // ⚡ Actualizamos la variable global
                    } else {
                        cerrarSesion();
                    }
                } catch (e) {}
            }, 600000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            iniciarRenovacionDespacho();
        });

        // ==========================================
        // PEDIDOS Y PDF
        // ==========================================
        async function cargarPedidos() {
        try {
            const res = await fetch(`${API_URL}/pedidos-admin`, { headers: { 'Authorization': `Bearer ${tokenPrivado}` } });
            if (res.ok) {
                historialPedidos = await res.json(); // ⚡ AQUÍ GUARDAMOS LOS DATOS EN LA MEMORIA
                renderizarPedidos(historialPedidos);
            }
            else cerrarSesion();
        } catch (e) { console.error(e); }
    }

        function renderizarPedidos(pedidos) {
            const grid = document.getElementById('grid-pedidos');
            grid.innerHTML = '';

            if(pedidos.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">Aún no hay pedidos registrados.</p>'; return;
            }

            pedidos.forEach(p => {
                const esPagado = p.estatus === "PAGADO";
                const esEnviado = p.estatus === "ENVIADO";
                
                
                let colorBadge = "bg-gray-100 text-gray-700 border-gray-200";
                if (p.estatus === "PAGADO") colorBadge = "bg-emerald-100 text-emerald-700 border-emerald-200";
                if (p.estatus === "PENDIENTE") colorBadge = "bg-amber-100 text-amber-700 border-amber-200";
                if (p.estatus === "ENVIADO") colorBadge = "bg-blue-100 text-blue-700 border-blue-200";
                if (p.estatus === "ENTREGADO") colorBadge = "bg-teal-100 text-teal-700 border-teal-200";
                
                let listaRopa = p.detalles.map(d => `<li class="text-xs text-gray-600 border-b border-gray-50 pb-1 mt-1 font-medium">• ${d.cantidad}x [${d.codigo}] ${d.nombre}</li>`).join('');
                const stringRopa = p.detalles.map(d => `${d.cantidad}x [${d.codigo}] ${d.nombre}`).join('<br>');
                
                const btnPDF = esPagado ? `<button onclick="window.open('${API_URL}/pedidos/${p.id}/etiqueta?token=${tokenPrivado}', '_blank')" class="text-[10px] font-bold text-white bg-indigo-600 px-4 py-2 rounded-lg shadow hover:bg-indigo-700 transition-colors uppercase tracking-wider flex items-center gap-1 w-full justify-center"><span class="text-sm">🖨️</span> Imprimir Etiqueta</button>` : '';
                const btnWhatsApp = esPagado ? `<button onclick="marcarEnviado(${p.id}, '${p.folio}', '${p.telefono}', '${p.cliente}')" class="text-[10px] font-bold text-white bg-emerald-500 px-4 py-2 rounded-lg shadow hover:bg-emerald-600 transition-colors uppercase tracking-wider flex items-center gap-1 mt-2 w-full justify-center"><span class="text-sm">💬</span> Notificar Envío por WA</button>` : '';
                
                const btnEntregado = esEnviado ? `<button onclick="marcarEntregado(${p.id})" class="text-[10px] font-bold text-teal-700 bg-teal-100 border border-teal-200 px-4 py-2 rounded-lg shadow-sm hover:bg-teal-200 transition-colors uppercase tracking-wider flex items-center gap-1 mt-2 w-full justify-center"><span class="text-sm">🏁</span> Marcar como Entregado</button>` : '';

                // ⚡ EL NUEVO BOTÓN PARA LOS CARRITOS FANTASMAS
                const esPendiente = p.estatus === "PENDIENTE" || p.estatus === "RECORDATORIO_ENVIADO";
                const btnEliminar = esPendiente ? `<button onclick="borrarAbandonado(${p.id})" class="text-[10px] font-bold text-rose-700 bg-rose-100 border border-rose-200 px-4 py-2 rounded-lg shadow-sm hover:bg-rose-200 transition-colors uppercase tracking-wider flex items-center gap-1 mt-2 w-full justify-center"><span class="text-sm">🗑️</span> Borrar Abandonado</button>` : '';
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <span class="font-black text-indigo-900">${p.folio}</span>
                            <span class="text-[10px] font-bold px-3 py-1 rounded-full border ${colorBadge}">${p.estatus}</span>
                        </div>
                        <div class="p-5 flex-1">
                            <p class="text-sm font-bold text-gray-800 mb-1">${p.cliente} <span class="text-xs font-normal text-gray-400">(${p.telefono})</span></p>
                            <div class="bg-indigo-50 p-3 rounded-lg mb-4 mt-3 flex flex-col">
                                <p class="text-xs text-indigo-900 leading-relaxed font-medium mb-3">${p.direccion_completa}<br><span class="text-indigo-400 italic">Ref: ${p.referencias || 'Ninguna'}</span></p>
                                ${btnPDF}
                                ${btnWhatsApp}
                                ${btnEntregado}
                                ${btnEliminar} <!-- ⚡ AQUÍ LO IMPRIMES -->
                            </div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Artículos comprados:</p>
                            <ul class="mb-2">${listaRopa}</ul>
                        </div>
                    </div>
                `;
            });
        }

        async function marcarEnviado(id, folio, telefono, cliente) {
            const { value: guia } = await Swal.fire({
                title: 'Confirmar Envío', text: 'Ingresa el número de guía o paquetería (Opcional):',
                input: 'text', showCancelButton: true, confirmButtonText: 'Notificar y Enviar', confirmButtonColor: '#10b981'
            });

            if (guia !== undefined) {
                Swal.fire({ title: 'Procesando...', allowOutsideClick: false, showConfirmButton: false });
                Swal.showLoading();

                try {
                    const res = await fetch(`${API_URL}/pedidos/${id}/enviar`, {
                        method: 'PATCH', 
                        headers: { 
                            'Authorization': `Bearer ${tokenPrivado}`,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ guia: guia || "" }) 
                    });

                    if (res.ok) {
                        let telLimpio = telefono.replace(/\D/g, '');
                        if (telLimpio.length === 10) telLimpio = '52' + telLimpio;

                        let texto = `¡Hola ${cliente}! 👋 Somos de *Surprise Jeans*.\n\nTe avisamos que tu pedido *${folio}* ya va en camino hacia ti 🚀.\n\n`;
                        if (guia.trim() !== "") texto += `📦 Tu número de rastreo es: *${guia}*\n\n`;
                        texto += `¡Gracias por tu compra!`;

                        const urlWA = `https://api.whatsapp.com/send?phone=${telLimpio}&text=${encodeURIComponent(texto)}`;
                        Swal.fire({ icon: 'success', title: '¡Enviado!', text: 'Abriendo WhatsApp...', timer: 1500, showConfirmButton: false });

                        setTimeout(() => { window.open(urlWA, '_blank'); cargarPedidos(); }, 1500);
                    }
                } catch (e) { Swal.fire({icon: 'error', title: 'Error', text: 'Error de conexión.'}); }
            }
        }

        async function borrarAbandonado(id) {
            const result = await Swal.fire({
                title: '¿Fulminar carrito fantasma?',
                text: 'Esta acción borrará el pedido permanentemente de tu sistema.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e11d48',
                confirmButtonText: 'Sí, borrarlo'
            });

            if (result.isConfirmed) {
                Swal.showLoading();
                try {
                    const res = await fetch(`${API_URL}/pedidos/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${tokenPrivado}` }
                    });
                    if (res.ok) {
                        Swal.fire({ icon: 'success', title: '¡Eliminado!', showConfirmButton: false, timer: 1000 });
                        cargarPedidos();
                    }
                } catch(e) { 
                    Swal.fire('Error', 'Fallo de conexión', 'error'); 
                }
            }
        }

        // ==========================================
        // CONTROL RÁPIDO DE INVENTARIO
        // ==========================================
        async function cargarInventario() {
            try {
                const res = await fetch(`${API_URL}/pantalones`);
                const pantalones = await res.json();
                pantalones.sort((a, b) => {
                    if (a.stock === 0 && b.stock > 0) return 1;
                    if (a.stock > 0 && b.stock === 0) return -1;
                    return 0; 
                });
                renderizarInventario(pantalones);
            } catch (error) { console.error(error); }
        }

        function renderizarInventario(pantalones) {
            const tbody = document.getElementById('tbody-inventario');
            tbody.innerHTML = '';
            
            pantalones.forEach(p => {
                const bgStock = p.stock === 0 ? 'bg-rose-50' : 'bg-white';
                const colorTextoStock = p.stock === 0 ? 'text-rose-600' : 'text-emerald-600';
                
                // ⚡ EXTRAEMOS EL COLOR PARA EL ALMACÉN
                const colorModelo = p.tallas && p.tallas.length > 0 ? p.tallas[0].color : "Original";
                const colorSeguro = colorModelo ? String(colorModelo).replace(/'/g, "\\'") : 'Original';
                const badgeColor = colorSeguro !== 'Original' 
                    ? `<span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[10px] font-bold ml-1">${colorSeguro}</span>` 
                    : '';

                tbody.innerHTML += `
                    <tr class="${bgStock} border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td class="p-4 flex items-center gap-3">
                            <img src="${p.imagen_url}" class="w-12 h-12 object-cover rounded-md border border-gray-200 shadow-sm">
                            <div>
                                <p class="text-sm font-bold text-gray-800 uppercase leading-tight">
                                    ${p.nombre} ${badgeColor}
                                </p>
                                <p class="text-[10px] text-gray-500 font-mono mt-0.5">[${p.codigo}]</p>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <input type="number" id="precio-${p.id}" value="${p.precio}" step="0.01" class="w-24 p-2 text-sm border border-gray-300 rounded-lg text-center focus:ring-2 focus:ring-indigo-500 outline-none shadow-inner font-medium">
                        </td>
                        <td class="p-4 text-center">
                            <input type="number" id="stock-${p.id}" value="${p.stock}" class="w-20 p-2 text-sm font-black ${colorTextoStock} border border-gray-300 rounded-lg text-center focus:ring-2 focus:ring-indigo-500 outline-none shadow-inner">
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="guardarCambiosPantalon(${p.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-md transition-transform active:scale-95 flex items-center gap-1">
                                    <span>💾</span> Guardar
                                </button>
                                <button onclick="marcarAgotado(${p.id})" title="Marcar como agotado rápido" class="bg-rose-100 hover:bg-rose-200 text-rose-700 text-lg px-3 py-1.5 rounded-lg shadow-sm transition-transform active:scale-95">
                                    ❌
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }
        
        async function guardarCambiosPantalon(id) {
            if (!tokenPrivado) return;
            const precio = document.getElementById(`precio-${id}`).value;
            const stock = document.getElementById(`stock-${id}`).value;
            
            try {
                const res = await fetch(`${API_URL}/pantalones/${id}/rapido`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tokenPrivado}` },
                    body: JSON.stringify({ precio: parseFloat(precio), stock: parseInt(stock) })
                });
                
                if(res.ok) {
                    Swal.fire({ icon: 'success', title: 'Inventario Actualizado', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
                    cargarInventario();
                }
            } catch(e) { Swal.fire({icon: 'error', title: 'Error', text: 'No se guardaron los cambios'}); }
        }

        function marcarAgotado(id) {
            document.getElementById(`stock-${id}`).value = 0;
            guardarCambiosPantalon(id);
        }

    // ==========================================
        // GENERADOR DE REPORTES (EXCEL / CSV)
        // ==========================================
        function descargarReporteExcel() {
            if (!historialPedidos || historialPedidos.length === 0) {
                Swal.fire('Sin datos', 'No hay pedidos en la pantalla para generar el reporte.', 'info');
                return;
            }

            // 1. Iniciamos el archivo con un "BOM" para que Excel detecte los acentos y las 'Ñ' de México.
            let csvContent = "\uFEFF"; 
            
            // 2. Escribimos los títulos de las columnas
            csvContent += "FOLIO,ESTATUS,CLIENTE,TELEFONO,DIRECCION,ARTICULOS,TOTAL PAGADO\n";

            // 3. Llenamos las filas con los datos de los pedidos
            historialPedidos.forEach(p => {
                let folio = p.folio;
                let estatus = p.estatus;
                // ⚡ FORMATO CSV UNIVERSAL: Envolver en comillas dobles para proteger comas originales
                let cliente = p.cliente ? `"${p.cliente.replace(/"/g, '""')}"` : '"N/A"';
                let telefono = p.telefono ? `"${p.telefono.replace(/"/g, '""')}"` : '"N/A"';
                let direccion = p.direccion_completa ? `"${p.direccion_completa.replace(/"/g, '""')}"` : '"N/A"';
                
                // Juntamos todos los artículos de ropa en un solo texto (Ej: 1x Mom Jeans + 2x Skinny)
                let articulos = p.detalles.map(d => `${d.cantidad}x ${d.nombre}`).join(" + ");
                let total = p.total || 0;

                // Agregamos la fila al archivo
                csvContent += `${folio},${estatus},${cliente},${telefono},${direccion},${articulos},$${total.toFixed(2)}\n`;
            });

            // 4. Creamos el archivo "invisible" y forzamos la descarga en el navegador
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            // Generamos un nombre dinámico con la fecha de hoy
            const hoy = new Date().toISOString().split('T')[0]; 
            
            link.setAttribute("href", url);
            link.setAttribute("download", `Corte_Caja_SurpriseJeans_${hoy}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            Swal.fire({ 
                icon: 'success', 
                title: '¡Reporte Generado!', 
                text: 'Tu archivo CSV se ha descargado. Puedes abrirlo directamente con Excel.', 
                timer: 3000, 
                showConfirmButton: false 
            });
        }
    </script>
</body>
</html>
